name: Test

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - .github/workflows/**
      - '!.github/workflows/test.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install

      - name: Frontend checks
        run: |
          pnpm run frontend:lint
          pnpm run frontend:format:check
          pnpm run frontend:check

      - name: Check i18n regressions
        env:
          GITHUB_BASE_REF: ${{ github.base_ref || 'main' }}
        run: ./scripts/check-i18n.sh

      - name: Build frontend
        run: cd frontend && pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-12-04
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          cache-provider: "github"
          cache-on-failure: true
          shared-key: "shared"
          cache-all-crates: true

      - name: Setup SSH Agent for private dependencies
        id: ssh-setup
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Install sqlx-cli
        uses: taiki-e/cache-cargo-install-action@v0.9.0
        with:
          tool: sqlx-cli
          no-default-features: true
          features: sqlite,postgres

      - name: Backend checks
        run: |
          pnpm run backend:format:check
          pnpm run generate-types:check
          pnpm run prepare-db:check
          cargo test --workspace
          pnpm run backend:lint

      - name: Remote crate checks
        if: ${{ steps.ssh-setup.outcome == 'success' }}
        run: |
          pnpm run remote:generate-types:check

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentsChatGroup UI Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #F4F8FC;
            --glass-bg: rgba(255, 255, 255, 0.78);
            --glass-border: rgba(255, 255, 255, 0.52);
            --text-strong: #14324C;
            --user-bubble: rgb(201,231,255);
            --user-bubble-text: #163A59;
            --user-pill: rgba(22, 58, 89, 0.10);
            --accent: #5C9DFF;
            --accent-deep: #377DDA;
            --accent-soft: #D8EBFF;
            --shadow-soft: rgba(85, 140, 214, 0.18);
            --input-focus: rgba(92, 157, 255, 0.18);
            --agent-progress: linear-gradient(90deg, #80B8FF 0%, #4E8FF0 100%);
            --shimmer: conic-gradient(from 0deg, transparent, #8BBEFF, transparent 30%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top, rgba(201, 231, 255, 0.28), transparent 30%),
                linear-gradient(180deg, #F7FBFF 0%, var(--page-bg) 100%);
            color: #1f2937;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        body.theme-original {
            --page-bg: #F9F8F6;
            --glass-bg: rgba(255, 255, 255, 0.70);
            --glass-border: rgba(255, 255, 255, 0.40);
            --text-strong: #0D1B2A;
            --user-bubble: #0D1B2A;
            --user-bubble-text: #ffffff;
            --user-pill: rgba(255,255,255,0.20);
            --accent: #1B4965;
            --accent-deep: #0D1B2A;
            --accent-soft: #E7EEF7;
            --shadow-soft: rgba(13, 27, 42, 0.12);
            --input-focus: rgba(27, 73, 101, 0.16);
            --agent-progress: linear-gradient(90deg, #1B4965 0%, #0D1B2A 100%);
            --shimmer: conic-gradient(from 0deg, transparent, #1B4965, transparent 30%);
            background:
                linear-gradient(180deg, #FCFBFA 0%, var(--page-bg) 100%);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: all 0.25s ease;
        }

        .app-title {
            color: var(--text-strong);
        }

        .user-bubble {
            background-color: var(--user-bubble);
            color: var(--user-bubble-text);
            box-shadow: 0 16px 34px -20px var(--shadow-soft);
            transition: all 0.25s ease;
        }

        .user-pill {
            background: var(--user-pill);
            color: inherit;
        }

        .accent-btn {
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
            color: white;
            box-shadow: 0 12px 24px -14px var(--shadow-soft);
        }

        .accent-text {
            color: var(--accent-deep);
        }

        .accent-border {
            border-color: rgba(92, 157, 255, 0.28);
        }

        body.theme-original .accent-border {
            border-color: rgba(27, 73, 101, 0.18);
        }

        .progress-fill {
            background: var(--agent-progress);
        }

        .soft-panel {
            background: linear-gradient(180deg, rgba(255,255,255,0.86) 0%, rgba(255,255,255,0.72) 100%);
            border: 1px solid rgba(148, 163, 184, 0.14);
        }

        .preview-chip.active {
            background: var(--accent-soft);
            color: var(--accent-deep);
            border-color: rgba(92, 157, 255, 0.22);
        }

        body.theme-original .preview-chip.active {
            background: rgba(13,27,42,0.08);
            color: #0D1B2A;
            border-color: rgba(13,27,42,0.12);
        }

        .shimmer-border {
            position: relative;
            overflow: hidden;
        }

        .shimmer-border::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: var(--shimmer);
            animation: rotate 4s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .monospace {
            font-family: 'JetBrains Mono', monospace;
        }

        .preview-ring {
            box-shadow: 0 0 0 4px rgba(201, 231, 255, 0.45);
        }

        body.theme-original .preview-ring {
            box-shadow: 0 0 0 4px rgba(13, 27, 42, 0.08);
        }

        .message-input {
            transition: box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .message-input:focus {
            outline: none;
            box-shadow: inset 0 0 0 1px rgba(92, 157, 255, 0.18), 0 0 0 4px var(--input-focus);
            border-radius: 0.9rem;
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div class="max-w-3xl mx-auto min-h-screen flex items-center justify-center p-4 md:p-8">
        <main class="w-full space-y-6">
            <div class="flex justify-center mb-6">
                <div class="soft-panel rounded-2xl px-3 py-2 shadow-sm preview-ring">
                    <div class="flex items-center gap-2">
                        <button class="preview-chip active px-3 py-1.5 rounded-xl border text-xs font-medium text-slate-600 transition-all" data-theme="updated">新配色</button>
                        <button class="preview-chip px-3 py-1.5 rounded-xl border border-slate-200 text-xs font-medium text-slate-500 transition-all" data-theme="original">原配色</button>
                    </div>
                </div>
            </div>

            <div class="flex justify-end">
                <div class="max-w-[85%] user-bubble px-5 py-3 rounded-2xl rounded-tr-none">
                    <p class="text-[15px] leading-relaxed">
                        <span class="user-pill px-2 py-0.5 rounded-full text-xs font-medium mr-1 select-none">@测试</span>
                        你会做什么？展示一下你的数据分析能力。
                    </p>
                </div>
            </div>

            <div class="flex justify-start">
                <div class="relative p-[1px] rounded-2xl shimmer-border max-w-[85%]">
                    <div class="glass-card rounded-[15px] px-5 py-4 shadow-sm">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center space-x-2">
                                <div class="w-5 h-5 rounded bg-white shadow-inner flex items-center justify-center">
                                    <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                                </div>
                                <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">测试 (Agent)</span>
                            </div>
                            <button class="text-[10px] font-medium text-[#E2725B] border border-[#E2725B]/30 px-2 py-0.5 rounded-md hover:bg-[#E2725B]/10 transition-colors">
                                停止运行
                            </button>
                        </div>
                        <p class="text-[14px] text-slate-600 mb-2 italic">Agent 正在运行。已用时 1.2 秒...</p>
                        <div class="space-y-2">
                            <div class="h-2 w-full bg-slate-200/60 rounded-full overflow-hidden">
                                <div class="h-full progress-fill w-1/3 rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-start">
                <div class="glass-card max-w-[90%] rounded-2xl px-6 py-5 shadow-sm">
                    <div class="flex items-center space-x-2 mb-4">
                        <div class="w-5 h-5 rounded accent-btn flex items-center justify-center text-[10px] text-white font-bold">T</div>
                        <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">测试</span>
                    </div>

                    <div class="prose prose-sm text-slate-700 leading-relaxed">
                        你好，我在。我已经为您生成了最新的项目分析报告：
                    </div>

                    <div class="mt-4 overflow-hidden border border-slate-100 rounded-lg">
                        <table class="min-w-full text-[13px] monospace">
                            <thead class="bg-slate-50/70">
                                <tr>
                                    <th class="px-3 py-2 text-left font-semibold text-slate-500">指标</th>
                                    <th class="px-3 py-2 text-left font-semibold text-slate-500">数值</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                <tr>
                                    <td class="px-3 py-2 text-slate-600">活跃用户 (DAU)</td>
                                    <td class="px-3 py-2 text-emerald-600 font-medium">1.2k (+12%)</td>
                                </tr>
                                <tr>
                                    <td class="px-3 py-2 text-slate-600">模型响应延迟</td>
                                    <td class="px-3 py-2 text-slate-800">840ms</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-4 flex items-center justify-between opacity-50 text-[10px] monospace">
                        <span>Tokens: 1.4k / 128k</span>
                        <span>03/07 23:15</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const body = document.body;
        const chips = document.querySelectorAll('[data-theme]');

        function applyTheme(theme) {
            body.classList.toggle('theme-original', theme === 'original');
            chips.forEach(chip => {
                const active = chip.dataset.theme === theme;
                chip.classList.toggle('active', active);
            });
        }

        chips.forEach(chip => {
            chip.addEventListener('click', () => applyTheme(chip.dataset.theme));
        });

        applyTheme('updated');
    </script>
</body>
</html>

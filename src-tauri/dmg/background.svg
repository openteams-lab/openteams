<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f6f8"/>
    </linearGradient>
    <radialGradient id="accent" cx="50%" cy="38%" r="58%">
      <stop offset="0" stop-color="#5e6ad2" stop-opacity="0.13"/>
      <stop offset="0.55" stop-color="#5e6ad2" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#5e6ad2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#828fff"/>
      <stop offset="1" stop-color="#4853c0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2b2d34" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="660" height="400" fill="url(#canvas)"/>
  <rect width="660" height="400" fill="url(#accent)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
    <text x="330" y="52" fill="#0a0a0c" font-size="24" font-weight="650" letter-spacing="-0.4">openteams</text>
    <text x="330" y="78" fill="#62666d" font-size="13" font-weight="450">Drag openteams to Applications</text>
  </g>

  <rect x="58" y="105" width="544" height="226" rx="24" fill="#ffffff" stroke="#e3e5ea" filter="url(#shadow)"/>
  <rect x="59" y="106" width="542" height="224" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.9"/>

  <g fill="none" stroke="url(#arrow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M276 212 H382" stroke-width="4"/>
    <path d="M367 197 L382 212 L367 227" stroke-width="4"/>
  </g>
  <circle cx="276" cy="212" r="4" fill="#828fff"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
    <text x="330" y="366" fill="#8a8f98" font-size="11" font-weight="450" letter-spacing="0.15">LOCAL-FIRST MULTI-AGENT COLLABORATION</text>
  </g>
</svg>
